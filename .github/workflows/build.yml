name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Qt Widgets needs a few X/GL dev libraries to link on Linux runners.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libvulkan-dev

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5

      # The Ninja generator needs cl.exe/link.exe on PATH. install-qt-action does
      # not provide the MSVC toolchain environment, so set it up explicitly.
      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          cache: true

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DDJ_BUILD_APP=ON
          -DDJ_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # --- Packaging (tag pushes only) -------------------------------------
      - name: Package (Windows portable)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/dj-lib-goodizer | Out-Null
          Copy-Item build/app/dj-lib-goodizer.exe dist/dj-lib-goodizer/
          windeployqt --release --no-translations --no-system-d3d-compiler `
            dist/dj-lib-goodizer/dj-lib-goodizer.exe
          Compress-Archive -Path dist/dj-lib-goodizer/* `
            -DestinationPath dist/dj-lib-goodizer-windows-x64.zip

      - name: Package (Linux tarball)
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/')
        run: |
          cmake --install build --prefix dist/dj-lib-goodizer/usr
          tar -czf dist/dj-lib-goodizer-linux-x64.tar.gz -C dist dj-lib-goodizer

      - name: Upload package
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: ignore

  # Verifies the FFmpeg broad-format decode backend compiles, links, and passes
  # tests with DJ_WITH_AUDIO_BACKENDS=ON. Uses apt-provided FFmpeg dev libraries
  # (fast) rather than building FFmpeg from source via vcpkg. App build is off
  # here so no Qt is needed — this job only exercises the headless core.
  backend-linux:
    name: linux-audio-backends
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg + build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            pkg-config \
            libavformat-dev \
            libavcodec-dev \
            libavutil-dev \
            libswresample-dev

      - name: Configure (audio backends on)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DDJ_BUILD_APP=OFF
          -DDJ_BUILD_TESTS=ON
          -DDJ_WITH_AUDIO_BACKENDS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
