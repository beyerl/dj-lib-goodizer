name: ci

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # Job A: the shippable Qt GUI app + cli + tests, built WITH FFmpeg
  # (DJ_WITH_AUDIO_BACKENDS=ON) on Windows and Linux so it decodes MP3/AAC/OGG/
  # FLAC/ALAC/AIFF. Publishes downloadable builds on every push.
  # --------------------------------------------------------------------------
  native-app:
    name: native-app-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgl1-mesa-dev libxkbcommon-dev libvulkan-dev \
            pkg-config ffmpeg \
            libavformat-dev libavcodec-dev libavutil-dev libswresample-dev

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Cache the vcpkg-built FFmpeg so only the first Windows run pays the build.
      - name: Cache vcpkg binaries (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          cache: true

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DDJ_BUILD_APP=ON -DDJ_BUILD_CLI=ON -DDJ_BUILD_TESTS=ON
          -DDJ_WITH_AUDIO_BACKENDS=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDJ_BUILD_APP=ON -DDJ_BUILD_CLI=ON -DDJ_BUILD_TESTS=ON \
            -DDJ_WITH_AUDIO_BACKENDS=ON \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-windows \
            -DVCPKG_MANIFEST_FEATURES=audio-backends

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        shell: bash
        run: |
          set +e
          out=$(ctest --test-dir build --output-on-failure 2>&1)
          rc=$?
          printf '%s\n' "$out"
          if [ $rc -ne 0 ]; then
            msg=$(printf '%s\n' "$out" | tail -50 | sed 's/%/%25/g; s/\r//g' \
                  | sed ':a;N;$!ba;s/\n/%0A/g')
            echo "::error title=ctest failed (rc=$rc)::$msg"
          fi
          exit $rc

      - name: App startup smoke
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./build/app/dj-lib-goodizer.exe --version
          else
            ./build/app/dj-lib-goodizer --version
          fi

      # Proves the FFmpeg backend actually decodes broad formats end-to-end
      # (Linux runners ship the ffmpeg CLI to synthesize the fixtures).
      - name: FFmpeg decode smoke (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -e
          mkdir -p fx
          ffmpeg -hide_banner -loglevel error -y -f lavfi \
            -i "sine=frequency=440:duration=1" -ac 2 fx/tone.flac
          ffmpeg -hide_banner -loglevel error -y -f lavfi \
            -i "sine=frequency=1000:duration=1" -ac 2 fx/tone.mp3 \
            || echo "(mp3 encode unavailable, continuing with flac only)"
          out=$(./build/cli/djcli import fx --db fx/lib.db)
          echo "$out"
          echo "$out" | grep -qE "imported [1-9]"
          ./build/cli/djcli analyze --db fx/lib.db

      # Self-contained Linux AppImage: linuxdeploy bundles the app, its FFmpeg
      # .so dependencies, and (via the qt plugin) Qt, so the GUI runs on any
      # mainstream glibc distro. APPIMAGE_EXTRACT_AND_RUN avoids needing FUSE.
      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          OUTPUT: dj-lib-goodizer-x86_64.AppImage
        run: |
          set -e
          mkdir -p tools
          base=https://github.com/linuxdeploy
          curl -sSL -o tools/linuxdeploy \
            $base/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -sSL -o tools/linuxdeploy-plugin-qt \
            $base/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x tools/linuxdeploy tools/linuxdeploy-plugin-qt
          export PATH="$PWD/tools:$PATH"
          export QMAKE="$(command -v qmake6 || command -v qmake)"
          linuxdeploy --appdir AppDir \
            --executable build/app/dj-lib-goodizer \
            --desktop-file packaging/linux/dj-lib-goodizer.desktop \
            --icon-file packaging/linux/dj-lib-goodizer.svg \
            --plugin qt --output appimage
          ls -la ./*.AppImage

      # --- Downloadable builds (every push) ---------------------------------
      # Windows: a self-contained portable zip. windeployqt bundles the Qt DLLs,
      # and the FFmpeg runtime DLLs are copied from vcpkg, so the GUI runs and
      # decodes broad formats on a clean machine; the Qt-free djcli is included.
      - name: Package Windows portable zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/dj-lib-goodizer | Out-Null
          Copy-Item build/app/dj-lib-goodizer.exe dist/dj-lib-goodizer/
          Copy-Item build/cli/djcli.exe dist/dj-lib-goodizer/
          windeployqt --release --no-translations --no-system-d3d-compiler `
            dist/dj-lib-goodizer/dj-lib-goodizer.exe
          $ffbin = "build/vcpkg_installed/x64-windows/bin"
          if (Test-Path $ffbin) { Copy-Item "$ffbin/*.dll" dist/dj-lib-goodizer/ -Force }
          Compress-Archive -Path dist/dj-lib-goodizer/* `
            -DestinationPath dist/dj-lib-goodizer-windows-x64.zip -Force

      - name: Upload Windows package
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: dj-lib-goodizer-windows-x64
          path: dist/dj-lib-goodizer-windows-x64.zip
          if-no-files-found: error

      - name: Upload Linux djcli
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: djcli-linux-x64
          path: build/cli/djcli
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: dj-lib-goodizer-linux-appimage
          path: ./*.AppImage
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Job B: fast anti-regression oracle AND no-backends fallback. Qt-free core +
  # cli + tests, DJ_WITH_AUDIO_BACKENDS OFF, on both OSes. Guarantees the
  # dependency-free path (WAV, pure-C++ resampler) keeps compiling and passing,
  # and exercises the historical SQLite-locking / threading paths.
  # --------------------------------------------------------------------------
  headless:
    name: headless-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DDJ_BUILD_APP=OFF
          -DDJ_BUILD_CLI=ON
          -DDJ_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        shell: bash
        run: |
          set +e
          out=$(ctest --test-dir build --output-on-failure 2>&1)
          rc=$?
          printf '%s\n' "$out"
          if [ $rc -ne 0 ]; then
            msg=$(printf '%s\n' "$out" | tail -50 | sed 's/%/%25/g; s/\r//g' \
                  | sed ':a;N;$!ba;s/\n/%0A/g')
            echo "::error title=ctest failed (rc=$rc)::$msg"
          fi
          exit $rc

      - name: djcli smoke
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./build/cli/djcli.exe --version
          else
            ./build/cli/djcli --version
          fi
