name: wasm

# Builds the Qt GUI as a WebAssembly module that runs in a browser (Chrome).
# This is the build target the browser-based end-to-end tests run against; it
# lets us reproduce and diagnose runtime UI bugs (e.g. the import progress bar)
# in an automatable environment.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

# Pages deployment needs these token scopes (id-token for the deploy attestation).
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight Pages deployment at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

# Qt 6.7.x targets this Emscripten release; keep them in lock-step.
env:
  QT_VERSION: 6.7.2
  EM_VERSION: 3.1.50

jobs:
  wasm-build:
    name: wasm (chrome)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EM_VERSION }}
          actions-cache-folder: emsdk-cache

      # qt-cmake needs a matching host (desktop) Qt for its build tools, plus the
      # wasm Qt for the actual target. Install desktop first and remember its
      # path, then install wasm (which becomes the active QT_ROOT_DIR).
      - name: Install Qt (host / desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Remember host Qt path
        run: echo "QT_HOST_PATH=$QT_ROOT_DIR" >> "$GITHUB_ENV"

      # Qt >= 6.7 publishes the WebAssembly packages under the host-agnostic
      # "all_os" host (not "linux"), so aqtinstall must be told host: all_os.
      - name: Install Qt (wasm)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: all_os
          target: wasm
          arch: wasm_singlethread
          cache: true

      # Configure via the Qt WebAssembly toolchain file directly (what qt-cmake
      # wraps) using plain `cmake`, sidestepping any exec-bit issues with the
      # qt-cmake wrapper. Diagnostics + full output are mirrored to the job
      # summary (publicly visible) so failures are debuggable without log auth.
      - name: Configure (Emscripten / Qt toolchain)
        run: |
          set +e
          {
            echo '## wasm configure'
            echo '```'
            echo "QT_ROOT_DIR=$QT_ROOT_DIR"
            echo "QT_HOST_PATH=$QT_HOST_PATH"
            echo "EMSDK=$EMSDK"
            echo "which cmake: $(which cmake)"
            echo "which emcc:  $(which emcc || echo MISSING)"
            echo "--- ls \$QT_ROOT_DIR/bin ---"; ls -la "$QT_ROOT_DIR/bin" 2>&1 | head -40
            echo "--- qt-cmake ---"; ls -la "$QT_ROOT_DIR/bin/qt-cmake" 2>&1
            echo "--- toolchain file ---"
            ls -la "$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake" 2>&1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo '### configure output' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cmake -S . -B build-wasm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DDJ_BUILD_APP=ON \
            -DDJ_BUILD_TESTS=OFF 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          rc=${PIPESTATUS[0]}
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit $rc

      - name: Build
        run: |
          set +e
          echo '### build output' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cmake --build build-wasm --parallel 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          rc=${PIPESTATUS[0]}
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit $rc

      - name: List build output
        if: ${{ always() }}
        run: |
          echo '### build-wasm/app contents' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -la build-wasm/app 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # --- End-to-end tests (Playwright, headless Chromium) ----------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install e2e dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        working-directory: tests/e2e
        env:
          CI: '1'
          WASM_DIR: ${{ github.workspace }}/build-wasm/app
        run: |
          set +e
          echo '### e2e output' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx playwright test 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          rc=${PIPESTATUS[0]}
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit $rc

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          if-no-files-found: ignore

      # --- Web artifact ----------------------------------------------------
      - name: Collect web artifact
        if: ${{ always() }}
        run: |
          mkdir -p dist-web
          cp build-wasm/app/index.html dist-web/ 2>/dev/null || true
          cp build-wasm/app/index.js dist-web/ 2>/dev/null || true
          cp build-wasm/app/index.wasm dist-web/ 2>/dev/null || true
          cp build-wasm/app/qtloader.js dist-web/ 2>/dev/null || true
          cp build-wasm/app/qtlogo.svg dist-web/ 2>/dev/null || true
          ls -la dist-web

      - name: Upload web build
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: dj-lib-goodizer-wasm
          path: dist-web
          if-no-files-found: ignore

  # Publish the built WebAssembly app to GitHub Pages (main branch only). The
  # single-threaded build needs no cross-origin-isolation headers, so it serves
  # fine from Pages. Requires the repo's Pages source to be set to
  # "GitHub Actions" (Settings -> Pages).
  deploy-pages:
    name: deploy (github pages)
    needs: wasm-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: dj-lib-goodizer-wasm
          path: dist-web

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (build type: GitHub Actions) on first run instead of
          # requiring it to be toggled by hand in repo settings.
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
